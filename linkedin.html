<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="refresh" content="0; url=https://www.linkedin.com/in/louispinet-avocat/" />
<title>Redirection vers LinkedIn…</title>
<meta name="theme-color" content="#1e1e1e" />
<meta name="robots" content="noindex,nofollow" />

<script>
  // Fallback JS si meta-refresh est bloqué (certains navigateurs anciens)
  // Utilise replace() pour ne pas polluer l'historique
  (function () {
    var target = 'https://www.linkedin.com/in/louispinet-avocat/';
    // Petit delay pour laisser le meta-refresh s'executer en priorite
    setTimeout(function () {
      try { window.location.replace(target); }
      catch (e) { window.location.href = target; }
    }, 50);
  })();
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1e1e1e;
    color: #f4f1ea;
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .box {
    max-width: 320px;
  }

  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #c4e913;
    border-radius: 50%;
    margin: 0 4px;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  p {
    margin-top: 18px;
    font-size: 14px;
    color: #a8a39a;
    line-height: 1.5;
  }

  a {
    display: inline-block;
    margin-top: 24px;
    padding: 10px 22px;
    background: #c4e913;
    color: #1e1e1e;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.005em;
  }

  a:hover { background: #d4f723; }
</style>
</head>
<body>
  <div class="box">
    <div aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p>Ouverture de LinkedIn…</p>
    <a href="https://www.linkedin.com/in/louispinet-avocat/" rel="noopener noreferrer">
      Cliquer ici si la redirection ne se fait pas
    </a>
  </div>
</body>
</html>
